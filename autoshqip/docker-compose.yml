version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: autoshqip_db
    environment:
      POSTGRES_USER: autoshqip
      POSTGRES_PASSWORD: password
      POSTGRES_DB: autoshqip
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: autoshqip_redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: autoshqip_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@autoshqip.al
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
